<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="color-scheme" content="light only">
<title>AUTOPHAGY — 14h Fasting Clock</title>
<style>
/* ============================================================
   ベースカラー: CMYK C10 M0 Y20 K30 → RGB #A1B38F (セージグリーン)
   フォント: News Gothic (カレンダー)
   ============================================================ */
:root{
  color-scheme:light;
  --base:      #7D7DB3;   /* K30 + ブルー30% (C30 M30) */
  --base-lt:   #9A9AC7;
  --base-dk:   #5E5E8C;
  --ink:       #2E3628;   /* 深いオリーブ黒 */
  --paper:     #EFF1E6;
  --fast-blue: #2F6FA0;   /* 断食14時間の帯 */
  --lv-red:    #C4372C;   /* 14h達成 */
  --lv-pink:   #E58C97;   /* 12–13h */
  --lv-yellow: #E5C43C;   /* 10–11h */
  --lv-blue:   #5F93BE;   /* 10h未満 */
  --gothic: "News Gothic", "News Gothic MT", "Franklin Gothic Medium",
            "Trade Gothic", "Helvetica Neue", Helvetica, Arial,
            "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--gothic);
  background:var(--base);
  color:var(--ink);
  padding:env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 24px);
  max-width:520px;margin:0 auto;
}

/* ---------- ヘッダー & デジタルカウントダウン ---------- */
header{padding:18px 2px 6px;display:flex;justify-content:space-between;align-items:baseline}
header h1{font-size:13px;letter-spacing:.28em;font-weight:700}
header .sub{font-size:10px;letter-spacing:.12em;opacity:.65}

#digital{
  background:var(--paper);
  border:1.5px solid var(--ink);
  border-radius:14px;
  padding:20px 16px 18px;
  margin-top:6px;
  box-shadow:3px 3px 0 var(--base-dk);
  text-align:center;
}
#digital .label{font-size:11px;letter-spacing:.24em;opacity:.7;font-weight:700}
#digTime{
  font-size:64px;font-weight:800;letter-spacing:.03em;line-height:1.1;
  font-variant-numeric:tabular-nums;
  padding:4px 0 12px;
}
#digital.done #digTime{color:var(--lv-red);font-size:44px;letter-spacing:.06em}
#digital.idle #digTime{font-size:64px;opacity:.35}

/* 減っていく帯: 青→緑→黄→オレンジ→ピンク→赤のグラデーション。
   グラデーション自体は固定で、clip-pathで右から削っていく */
#bandWrap{
  height:18px;border:1.5px solid var(--ink);border-radius:99px;
  overflow:hidden;background:#fff;
}
#band{
  height:100%;width:100%;
  background:linear-gradient(90deg,
    #C4372C 0%,      /* 赤 */
    #E58C97 16%,     /* ピンク */
    #E88C2E 35%,     /* オレンジ */
    #E5C43C 55%,     /* 黄 */
    #3E9B4F 78%,     /* 緑 */
    #2F6FA0 100%);   /* 青 */
  clip-path:inset(0 0 0 0);
  transition:clip-path .5s linear;
}
#digSub{font-size:10px;letter-spacing:.1em;opacity:.65;margin-top:8px;min-height:12px}

/* ---------- 入力パネル ---------- */
#panel{
  background:var(--paper);
  border:1.5px solid var(--ink);
  border-radius:14px;
  padding:14px;margin-top:14px;
  box-shadow:3px 3px 0 var(--base-dk);
}
#panel .row{display:flex;align-items:center;gap:8px;justify-content:center}
#panel label{font-size:11px;letter-spacing:.15em}
.timeInput{
  min-width:120px;padding:10px 12px;text-align:center;
  font-family:var(--gothic);font-size:24px;font-weight:700;
  border:1.5px solid var(--ink);border-radius:8px;background:#fff;color:var(--ink);
  -webkit-appearance:none;appearance:none;
}
input[type="time"]::-webkit-date-and-time-value{text-align:center}
.dayToggle{display:flex;border:1.5px solid var(--ink);border-radius:8px;overflow:hidden;margin-left:6px}
.dayToggle button{
  font-family:var(--gothic);font-size:12px;padding:9px 10px;border:0;background:#fff;color:var(--ink);
}
.dayToggle button.on{background:var(--ink);color:var(--paper)}
#panel .btns{display:flex;gap:8px;margin-top:12px}
#panel .btns button{
  flex:1;padding:12px 4px;border-radius:10px;border:1.5px solid var(--ink);
  font-family:var(--gothic);font-size:13px;font-weight:700;letter-spacing:.05em;
}
#btnStart{background:var(--fast-blue);color:#fff;border-color:var(--fast-blue)}
#btnEat{background:var(--lv-red);color:#fff;border-color:var(--lv-red)}
#btnComment{background:var(--paper);color:var(--ink)}
#panelMsg{text-align:center;font-size:11px;margin-top:8px;min-height:14px;opacity:.75}

/* ---------- カレンダー ---------- */
#calSection{margin-top:20px}
#calHead{display:flex;justify-content:space-between;align-items:center;padding:0 2px 8px}
#calHead .month{font-size:18px;font-weight:800;letter-spacing:.1em;color:var(--paper)}
#calHead button{
  border:1.5px solid var(--ink);background:var(--paper);color:var(--ink);
  width:34px;height:34px;border-radius:50%;font-size:15px;font-weight:700;
}
#weekdays,#calGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
#weekdays div{text-align:center;font-size:10px;letter-spacing:.1em;padding:3px 0;font-weight:700;opacity:.85;color:var(--paper)}
.cell{
  min-height:62px;background:var(--paper);
  border:1px solid var(--base-dk);border-radius:6px;
  padding:3px 3px 2px;position:relative;overflow:hidden;
  font-family:var(--gothic);
}
.cell.empty{background:transparent;border-color:transparent}
.cell .d{font-size:11px;font-weight:800}
.cell .hrs{font-size:8px;font-weight:700;opacity:.85;display:block}
.cell .cm{
  font-size:8px;line-height:1.25;display:block;margin-top:1px;
  word-break:break-all;overflow:hidden;max-height:20px;
}
.cell.today{outline:3px solid #FF1E1E;outline-offset:-1px;z-index:1}
.cell.selected{outline:3px solid #FF3EB5;outline-offset:-1px;z-index:2}
.cell.lv-red   {background:var(--lv-red);   color:#fff;border-color:var(--lv-red)}
.cell.lv-pink  {background:var(--lv-pink);  color:var(--ink);border-color:var(--lv-pink)}
.cell.lv-yellow{background:var(--lv-yellow);color:var(--ink);border-color:var(--lv-yellow)}
.cell.lv-blue  {background:var(--lv-blue);  color:#fff;border-color:var(--lv-blue)}

#legend{display:flex;gap:8px;justify-content:center;align-items:center;margin-top:10px}
#legend span{font-size:9px;letter-spacing:.05em;color:var(--paper)}
#legendBar{
  width:120px;height:8px;border-radius:99px;display:inline-block;
  background:linear-gradient(90deg,#C4372C 0%,#E58C97 16%,#E88C2E 35%,#E5C43C 55%,#3E9B4F 78%,#2F6FA0 100%);
}

/* ---------- モーダル ---------- */
#modalBg{
  position:fixed;inset:0;background:rgba(46,54,40,.55);
  display:none;align-items:center;justify-content:center;padding:20px;z-index:50;
}
#modalBg.show{display:flex}
#modal{
  background:var(--paper);border:1.5px solid var(--ink);border-radius:16px;
  width:100%;max-width:400px;padding:18px;box-shadow:4px 4px 0 var(--ink);
}
#modal h2{font-size:15px;letter-spacing:.08em;display:flex;justify-content:space-between;align-items:center}
#modal .badge{font-size:11px;padding:3px 10px;border-radius:99px;color:#fff;font-weight:700}
#modal textarea{
  width:100%;margin-top:12px;min-height:110px;resize:vertical;
  font-family:var(--gothic);font-size:14px;line-height:1.6;
  border:1.5px solid var(--ink);border-radius:10px;padding:10px;background:#fff;color:var(--ink);
}
#charCount{font-size:10px;text-align:right;opacity:.6;margin-top:4px}
#modal .btns{display:flex;gap:8px;margin-top:12px}
#modal .btns button{
  flex:1;padding:11px;border-radius:10px;border:1.5px solid var(--ink);
  font-family:var(--gothic);font-size:13px;font-weight:700;
}
#mSave{background:var(--ink);color:var(--paper)}
#mDelete{background:var(--paper);color:var(--lv-red);border-color:var(--lv-red) !important}
#mClose{background:var(--paper);color:var(--ink)}
</style>
</head>
<body>

<header>
  <h1>AUTOPHAGY</h1>
  <div class="sub">16H FASTING COUNTDOWN</div>
</header>

<div id="digital">
  <div class="label" id="digLabel">達成まで</div>
  <div id="digTime">--:--:--</div>
  <div id="bandWrap"><div id="band"></div></div>
  <div id="digSub"></div>
</div>

<div id="panel">
  <div class="row">
    <label>時刻</label>
    <input type="time" id="inTime" class="timeInput">
    <div class="dayToggle">
      <button id="dYest">昨日</button>
      <button id="dToday" class="on">今日</button>
    </div>
  </div>
  <div class="btns">
    <button id="btnStart">START !</button>
    <button id="btnEat">FINISH !</button>
    <button id="btnComment">COMMENT</button>
  </div>
  <div id="panelMsg"></div>
</div>

<section id="calSection">
  <div id="calHead">
    <button id="prevM" aria-label="前の月">‹</button>
    <div class="month" id="monthLabel"></div>
    <button id="nextM" aria-label="次の月">›</button>
  </div>
  <div id="weekdays"></div>
  <div id="calGrid"></div>
  <div id="legend">
    <span>16h達成</span>
    <i id="legendBar"></i>
    <span>断食短め</span>
  </div>
</section>

<div id="modalBg">
  <div id="modal">
    <h2><span id="mDate"></span><span class="badge" id="mBadge"></span></h2>
    <textarea id="mComment" maxlength="300" placeholder="コメントを記入(300字まで)"></textarea>
    <div id="charCount">0 / 300</div>
    <div class="btns">
      <button id="mSave">保存</button>
      <button id="mDelete">削除</button>
      <button id="mClose">閉じる</button>
    </div>
  </div>
</div>

<script>
/* ================= ストレージ(localStorage / メモリ両対応) ================= */
let mem = {};
const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return mem[k] ?? null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } }
};

/* state */
let lastMeal = null;                       // Date | null (断食開始 = 最後の食事)
let records  = {};                         // { "YYYY-MM-DD": {hours, level, comment} }
let viewYear, viewMonth;                   // カレンダー表示月
let modalKey = null;

function load(){
  const lm = store.get('af_lastMeal');
  if(lm) lastMeal = new Date(lm);
  try{ records = JSON.parse(store.get('af_records') || '{}'); }catch(e){ records = {}; }
}
function save(){
  store.set('af_lastMeal', lastMeal ? lastMeal.toISOString() : '');
  store.set('af_records', JSON.stringify(records));
}
function dateKey(d){
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function levelOf(h){
  if(h >= 14) return 'red';
  if(h >= 12) return 'pink';
  if(h >= 10) return 'yellow';
  return 'blue';
}
const levelName = {red:'14h達成', pink:'12–13h', yellow:'10–11h', blue:'10h未満'};
const levelColor = {red:'var(--lv-red)', pink:'var(--lv-pink)', yellow:'var(--lv-yellow)', blue:'var(--lv-blue)'};

/* 帯のグラデーションと同じ色定義。断食時間から「食べ終えた瞬間の帯の右端の色」を算出する */
const GRAD = [
  [  0, 196,  55,  44],   // 赤    #C4372C
  [ 16, 229, 140, 151],   // ピンク #E58C97
  [ 35, 232, 140,  46],   // オレンジ #E88C2E
  [ 55, 229, 196,  60],   // 黄    #E5C43C
  [ 78,  62, 155,  79],   // 緑    #3E9B4F
  [100,  47, 111, 160]    // 青    #2F6FA0
];
function colorForHours(hours){
  // 残り割合 = 帯の右端の位置。16時間達成なら0%(=赤)、断食0時間なら100%(=青)
  const pos = Math.max(0, Math.min(100, (16 - hours) / 16 * 100));
  for(let i=0; i<GRAD.length-1; i++){
    const a = GRAD[i], b = GRAD[i+1];
    if(pos <= b[0]){
      const t = (pos - a[0]) / (b[0] - a[0]);
      const r = Math.round(a[1] + (b[1]-a[1])*t);
      const g = Math.round(a[2] + (b[2]-a[2])*t);
      const bl = Math.round(a[3] + (b[3]-a[3])*t);
      return '#' + [r,g,bl].map(v=>v.toString(16).padStart(2,'0')).join('');
    }
  }
  return '#2F6FA0';
}
function textColorFor(hex){
  // 背景色の明るさから文字色(白/黒)を決める
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*0.299 + g*0.587 + b*0.114) > 150 ? 'var(--ink)' : '#fff';
}
function cellColorOf(rec){
  return rec.color || levelColor[rec.level] || 'var(--lv-blue)';
}

/* ================= 16時間デジタルカウントダウン + 帯 ================= */
const TARGET_H = 16;                       // 断食目標時間
const digBox  = document.getElementById('digital');
const digTime = document.getElementById('digTime');
const digLabel = document.getElementById('digLabel');
const digSub  = document.getElementById('digSub');
const band    = document.getElementById('band');

function pad2(n){ return String(n).padStart(2,'0'); }

function tick(){
  const now = new Date();
  if(!lastMeal){
    // 未開始
    digBox.className = 'idle';
    digLabel.textContent = 'FASTING TIMER';
    digTime.textContent = '--:--:--';
    digSub.textContent = '';
    band.style.clipPath = 'inset(0 100% 0 0)';
    return;
  }
  const target = new Date(lastMeal.getTime() + TARGET_H*3600*1000);
  const diff = target - now;
  if(diff <= 0){
    // 帯が消えたら断食成功
    digBox.className = 'done';
    digLabel.textContent = 'FASTING COMPLETE';
    digTime.textContent = 'YOU CAN EAT !';
    digSub.textContent = `${TARGET_H}時間達成 — FINISH ! で記録しましょう`;
    band.style.clipPath = 'inset(0 100% 0 0)';
  }else{
    digBox.className = '';
    digLabel.textContent = '達成まで';
    const h = Math.floor(diff/3600000);
    const m = Math.floor(diff%3600000/60000);
    const s = Math.floor(diff%60000/1000);
    digTime.textContent = `${pad2(h)}:${pad2(m)}:${pad2(s)}`;
    // 残り時間の割合ぶんだけ帯が残る(グラデーションは固定、右から削れていく)
    const remain = diff / (TARGET_H*3600*1000) * 100;
    band.style.clipPath = `inset(0 ${100 - remain}% 0 0)`;
    digSub.textContent = `GOAL ${fmt(target)}`;
  }
}

/* ================= 入力 ================= */
let dayOffset = 0; // 0=今日, -1=昨日
const dYest = document.getElementById('dYest');
const dToday = document.getElementById('dToday');
dYest.onclick  = () => { dayOffset=-1; dYest.classList.add('on'); dToday.classList.remove('on'); };
dToday.onclick = () => { dayOffset=0;  dToday.classList.add('on'); dYest.classList.remove('on'); };

const inTime = document.getElementById('inTime');
// 起動時はダイヤルを現在時刻に合わせておく
{
  const n = new Date();
  inTime.value = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

function readInput(base){
  if(!inTime.value) return null;
  const [h, m] = inTime.value.split(':').map(Number);
  if(isNaN(h) || isNaN(m)) return null;
  const d = base ? new Date(base) : new Date();
  d.setDate(d.getDate() + dayOffset);
  d.setHours(h, m, 0, 0);
  // 通常モードで「今日」のまま未来時刻を入れたら昨日と解釈
  if(!base && d > new Date()) d.setDate(d.getDate() - 1);
  return d;
}
const msg = document.getElementById('panelMsg');
function fmt(d){ return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`; }

/* 過去の日付をタップして選択 → 今日と同じやり方(時刻入力 + START!/FINISH!)で記録 */
let selectedKey = null;    // 選択中の日付 "YYYY-MM-DD"
let retroStart  = null;    // 選択日モードの断食開始時刻
function keyToDate(key){
  const [y,mo,da] = key.split('-').map(Number);
  return new Date(y, mo-1, da, 0, 0, 0, 0);
}

document.getElementById('btnStart').onclick = () => {
  const base = selectedKey ? keyToDate(selectedKey) : null;
  const d = readInput(base);
  if(!d){ msg.textContent = '時と分を入力してください'; return; }
  if(selectedKey){
    // 選択日モード: この日の記録用の開始時刻(「昨日」=選択日の前日)
    retroStart = d;
    msg.textContent = `${selectedKey.replace(/-/g,'.')} の断食スタート: ${fmt(d)}`;
  }else{
    lastMeal = d; save(); tick();
    msg.textContent = `断食スタート: ${fmt(d)}(達成は ${fmt(new Date(d.getTime()+TARGET_H*3600*1000))})`;
  }
};

document.getElementById('btnEat').onclick = () => {
  if(selectedKey){
    // 選択日モード: 選択した日に記録する
    if(!retroStart){ msg.textContent = '先に START ! を押してください'; return; }
    const d = readInput(keyToDate(selectedKey));
    if(!d){ msg.textContent = '食べ終えた時と分を入力してください'; return; }
    if(d <= retroStart){ msg.textContent = '終了時刻が開始時刻より前になっています'; return; }
    const hours = (d - retroStart) / 3600000;
    const prev = records[selectedKey] || {};
    records[selectedKey] = { hours: Math.round(hours*10)/10, color: colorForHours(hours), comment: prev.comment || '' };
    msg.textContent = `${selectedKey.replace(/-/g,'.')} に記録: ${records[selectedKey].hours}時間断食`;
    selectedKey = null; retroStart = null;   // 記録できたら選択解除
    save(); renderCalendar();
    return;
  }
  if(!lastMeal){ msg.textContent = '先に START ! で断食を開始してください'; return; }
  const d = readInput() || new Date();
  if(d <= lastMeal){ msg.textContent = '終了時刻が開始時刻より前になっています'; return; }
  const hours = (d - lastMeal) / 3600000;
  const key = dateKey(d);   // 達成判定は食べた日(日をまたぐため)
  const prev = records[key] || {};
  const col = colorForHours(hours);   // 食べ終えた瞬間の帯の右端の色
  records[key] = { hours: Math.round(hours*10)/10, color: col, comment: prev.comment || '' };
  msg.textContent = `${fmt(d)} 記録: ${records[key].hours}時間断食`;
  lastMeal = null;          // 断食終了 → 帯をクリア(次はSTART!から)
  save(); tick(); renderCalendar();
};

/* COMMENTボタン: 選択中の日(なければ今日)のコメントを開く */
document.getElementById('btnComment').onclick = () => {
  openModal(selectedKey || dateKey(new Date()));
};

/* ================= カレンダー ================= */
const grid = document.getElementById('calGrid');
const monthLabel = document.getElementById('monthLabel');
const WD = ['日','月','火','水','木','金','土'];
document.getElementById('weekdays').innerHTML = WD.map(w=>`<div>${w}</div>`).join('');
document.getElementById('prevM').onclick = () => { viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} renderCalendar(); };
document.getElementById('nextM').onclick = () => { viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} renderCalendar(); };

function renderCalendar(){
  monthLabel.textContent = `${viewYear}.${String(viewMonth+1).padStart(2,'0')}`;
  grid.innerHTML = '';
  const first = new Date(viewYear, viewMonth, 1);
  const days = new Date(viewYear, viewMonth+1, 0).getDate();
  const todayKey = dateKey(new Date());
  for(let i=0;i<first.getDay();i++){
    const e = document.createElement('div'); e.className='cell empty'; grid.appendChild(e);
  }
  for(let day=1; day<=days; day++){
    const key = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const r = records[key];
    const c = document.createElement('div');
    c.className = 'cell' + (key===todayKey ? ' today' : '') + (key===selectedKey ? ' selected' : '');
    let html = `<span class="d">${day}</span>`;
    if(r){
      if(r.hours > 0) html += `<span class="hrs">${r.hours}h</span>`;
      if(r.comment) html += `<span class="cm">${escapeHtml(r.comment.slice(0,15))}</span>`;
      const bg = r.color || null;
      if(bg){
        c.style.background = bg;
        c.style.borderColor = bg;
        c.style.color = textColorFor(bg);
      }else if(r.level){
        c.classList.add('lv-'+r.level);   // 旧データ互換
      }
    }
    c.innerHTML = html;
    c.onclick = () => {
      // タップで選択(ピンク枠)。もう一度タップで解除
      if(selectedKey === key){
        selectedKey = null; retroStart = null;
        msg.textContent = '';
      }else{
        selectedKey = key; retroStart = null;
        msg.textContent = `${key.replace(/-/g,'.')} を選択中`;
      }
      renderCalendar();
    };
    grid.appendChild(c);
  }
}
function escapeHtml(s){ return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* ================= コメントモーダル(COMMENTボタンから開く) ================= */
const modalBg = document.getElementById('modalBg');
const mComment = document.getElementById('mComment');
const charCount = document.getElementById('charCount');
function openModal(key){
  modalKey = key;
  const r = records[key];
  document.getElementById('mDate').textContent = key.replace(/-/g,'.');
  const badge = document.getElementById('mBadge');
  if(r && r.hours > 0){
    const bg = r.color || null;
    badge.style.display = '';
    badge.style.background = bg || levelColor[r.level] || 'var(--lv-blue)';
    badge.style.color = bg ? textColorFor(bg) : ((r.level==='pink'||r.level==='yellow') ? 'var(--ink)' : '#fff');
    badge.textContent = `${r.hours}h 断食`;
  }else{
    badge.style.display = 'none';
  }
  mComment.value = r ? (r.comment||'') : '';
  charCount.textContent = mComment.value.length + ' / 300';
  modalBg.classList.add('show');
}
mComment.oninput = () => charCount.textContent = mComment.value.length + ' / 300';
document.getElementById('mSave').onclick = () => {
  if(modalKey){
    const comment = mComment.value.slice(0,300);
    if(records[modalKey]){
      records[modalKey].comment = comment;
    }else if(comment){
      records[modalKey] = { hours:0, comment };   // コメントだけの日(色は付かない)
    }
    save(); renderCalendar();
  }
  modalBg.classList.remove('show');
};
document.getElementById('mDelete').onclick = () => {
  if(modalKey && records[modalKey] && confirm('この日の記録を削除しますか?')){
    delete records[modalKey];
    save(); renderCalendar();
    modalBg.classList.remove('show');
  }else if(!records[modalKey]){
    modalBg.classList.remove('show');
  }
};
document.getElementById('mClose').onclick = () => modalBg.classList.remove('show');
modalBg.onclick = e => { if(e.target === modalBg) modalBg.classList.remove('show'); };

/* ================= 起動 ================= */
load();
const nowInit = new Date();
viewYear = nowInit.getFullYear();
viewMonth = nowInit.getMonth();
renderCalendar();
tick();
setInterval(tick, 250);
</script>
